{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h3 class="mb-2 text-center">Apply for Job</h3>
            <p class="text-center text-muted">{{ job.title }} at {{ job.company_name }}</p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-success w-100">Submit Application</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
