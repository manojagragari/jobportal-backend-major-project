{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4">Edit Profile</h3>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3 text-center">
                    {% if form.instance.profile_image %}
                        <img src="{{ form.instance.profile_image.url }}" alt="Profile" class="rounded-circle" style="width: 150px; height: 150px; object-fit: cover;">
                    {% else %}
                        <div class="rounded-circle bg-secondary d-inline-flex align-items-center justify-content-center" style="width: 150px; height: 150px;">
                            <span class="text-white text-center">No Photo</span>
                        </div>
                    {% endif %}
                </div>

                <div class="mb-3">
                    <label class="form-label">Profile Photo</label>
                    {{ form.profile_image }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    {{ form.bio }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    {{ form.role }}
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        {{ form.phone }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        {{ form.location }}
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'users:dashboard' %}" class="btn btn-outline-dark">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
